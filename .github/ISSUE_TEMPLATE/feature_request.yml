name: Feature request
description: A new feature, transformer, schema field, or API.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the current API does not support.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behaviour
      description: Pseudo-code or rough sketch is fine.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - "New transformer"
        - "Schema / validation"
        - "Config / CLI"
        - "Performance"
        - "Framework integration"
        - "Docs"
        - "Other"
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I read the relevant section of dmc-docs/.
          required: true
