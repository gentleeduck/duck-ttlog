name: Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

# Single in-flight release at a time across the org's pinned crates so
# release-plz never trips over itself if two pushes land back-to-back.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz-pr:
    name: "release-plz: open / refresh release PR"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-publish:
    name: "release-plz: tag + publish to crates.io"
    needs: release-plz-pr
    # The crates-io environment requires manual approval before this job
    # runs, so an accidental merge to master cannot push to crates.io.
    environment: crates-io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
